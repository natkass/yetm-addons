name: Deploy Odoo Addons

on:
  push:
    branches:
      - main

jobs:

  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate manifest syntax (py_compile)
        run: |
          find . -name "__manifest__.py" | while read file; do
            python3 -m py_compile "$file" && echo "OK: $file"
          done

      - name: Validate manifest content (ast.literal_eval)
        run: |
          python3 <<EOF
          import ast, os, sys

          errors = []
          for root, dirs, files in os.walk("."):
              if "__manifest__.py" in files:
                  path = os.path.join(root, "__manifest__.py")
                  try:
                      with open(path) as f:
                          data = ast.literal_eval(f.read())
                      if not isinstance(data, dict):
                          errors.append(f"{path}: manifest is not a dict")
                      else:
                          print(f"OK: {path}")
                  except Exception as e:
                      errors.append(f"{path}: {e}")

          if errors:
              print("\nManifest errors found:")
              for err in errors:
                  print(" -", err)
              sys.exit(1)

          print("\nAll manifests valid.")
          EOF

      - name: Check required manifest keys
        run: |
          python3 <<EOF
          import ast, os, sys

          # Make 'version' optional
          REQUIRED_KEYS = {"name", "depends"}   # removed 'version'
          errors = []

          for root, dirs, files in os.walk("."):
              if "__manifest__.py" in files:
                  path = os.path.join(root, "__manifest__.py")
                  with open(path) as f:
                      data = ast.literal_eval(f.read())
                  missing = REQUIRED_KEYS - data.keys()
                  if missing:
                      errors.append(f"{path}: missing keys {missing}")
                  else:
                      print(f"OK: {path}")

          if errors:
              for err in errors:
                  print(err)
              sys.exit(1)

          print("\nAll required keys present.")
          EOF

      - name: Check for Python syntax errors in addon code
        run: |
          find . -name "*.py" \
            ! -path "./.git/*" | while read file; do
            python3 -m py_compile "$file" && echo "OK: $file"
          done

