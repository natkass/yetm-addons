name: Deploy Odoo Addons

on:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ==================== MANIFEST VALIDATION ====================
      - name: Validate Odoo Manifests
        run: |
          python3 <<'EOF'
          import ast
          import os
          import sys
          import re

          REQUIRED_KEYS = {"name", "depends"}
          RECOMMENDED_KEYS = {"version", "author", "license", "category", "description"}
          VERSION_PATTERN = re.compile(r"^\d+\.\d+\.\d+\.\d+\.\d+$")

          errors = []
          warnings = []

          for root, dirs, files in os.walk("."):
              if "__manifest__.py" in files:
                  path = os.path.join(root, "__manifest__.py")

                  try:
                      with open(path) as f:
                          data = ast.literal_eval(f.read())

                      if not isinstance(data, dict):
                          errors.append(f"{path}: manifest must be a dictionary")
                          continue

                      # Required keys
                      missing = REQUIRED_KEYS - data.keys()
                      if missing:
                          errors.append(f"{path}: missing required keys {missing}")

                      # Recommended keys
                      missing_rec = RECOMMENDED_KEYS - data.keys()
                      if missing_rec:
                          warnings.append(f"{path}: missing recommended keys {missing_rec}")

                      # Version format
                      if "version" in data:
                          ver = data["version"]
                          if not isinstance(ver, str) or not VERSION_PATTERN.match(ver):
                              warnings.append(f"{path}: version should follow format '16.0.1.0.0' (got: {ver})")
                      else:
                          warnings.append(f"{path}: missing 'version' key (recommended)")

                      # Depends should be list
                      if "depends" in data and not isinstance(data.get("depends"), list):
                          errors.append(f"{path}: 'depends' must be a list")

                      if not isinstance(data.get("name", ""), str):
                          errors.append(f"{path}: 'name' must be a string")

                      print(f"✅ {path}")

                  except Exception as e:
                      errors.append(f"{path}: failed to parse - {e}")

          # Check __init__.py
          for root, dirs, files in os.walk("."):
              if "__manifest__.py" in files and "__init__.py" not in files:
                  warnings.append(f"{root}: missing __init__.py")

          # Summary
          print("\n" + "="*70)
          if warnings:
              print("⚠️  WARNINGS:")
              for w in warnings:
                  print(f"   {w}")
              print()

          if errors:
              print("❌ ERRORS:")
              for e in errors:
                  print(f"   {e}")
              sys.exit(1)

          print("🎉 All manifests passed validation!")
          EOF

      # ==================== PYTHON SYNTAX ====================
      - name: Check Python syntax in all addons
        run: |
          echo "Checking Python syntax..."
          find . -name "*.py" ! -path "./.git/*" -print0 | xargs -0 -n1 python3 -m py_compile || exit 1
          echo "✅ All Python files have valid syntax."

      # ==================== XML VALIDATION (Fixed) ====================
      - name: Validate XML files
        run: |
          echo "Checking XML syntax..."
          if ! find . -name "*.xml" ! -path "./.git/*" | grep -q .; then
            echo "No XML files found."
            exit 0
          fi

          # Use xmllint (more reliable than inline python -c)
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libxml2-utils

          find . -name "*.xml" ! -path "./.git/*" | while read -r file; do
            if ! xmllint --noout "$file" 2>&1; then
              echo "❌ XML error in: $file"
              exit 1
            else
              echo "✅ $file"
            fi
          done
          echo "✅ All XML files are valid."
          
      # ==================== PERFORMANCE TEST (IMPORT/COMPILE TIME) ====================
      - name: Measure Python compile/import performance
        run: |
          echo "Measuring Python compile performance..."

          python3 - <<'EOF'
          import time
          import os
          import sys

          THRESHOLD_SECONDS = 10  # adjust based on repo size

          start = time.perf_counter()

          file_count = 0

          for root, _, files in os.walk("."):
              for f in files:
                  if f.endswith(".py") and ".git" not in root:
                      path = os.path.join(root, f)
                      file_count += 1

                      try:
                          with open(path, "r", encoding="utf-8") as fp:
                              source = fp.read()
                          compile(source, path, "exec")
                      except Exception as e:
                          print(f"❌ Failed compiling {path}: {e}")
                          sys.exit(1)

          duration = time.perf_counter() - start

          print("\n================ PERFORMANCE REPORT ================")
          print(f"Python files scanned : {file_count}")
          print(f"Total compile time   : {duration:.4f} seconds")

          avg = duration / file_count if file_count else 0
          print(f"Average per file     : {avg:.6f} seconds")

          print("====================================================")

          if duration > THRESHOLD_SECONDS:
              print(f"❌ Performance regression: exceeded {THRESHOLD_SECONDS}s")
              sys.exit(1)

          print("✅ Performance within acceptable limits")
          EOF
